name: Check committed OpenAPI spec is in sync

# The committed stainless/openapi.json is the workspace source of truth for local
# `stlc build` and `stlc init`. This check fails a PR when the spec generated from
# apps/api drifts from the committed snapshot, so the snapshot stays honest.
# (Production generation regenerates the spec fresh on deploy — see
# stlc-generate.yml — so this is about keeping the committed copy accurate for
# local/dev use, not about gating releases.)

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "stainless/openapi.json"

permissions:
  contents: read

jobs:
  spec-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup tools
        uses: ./.github/actions/setup-tools

      - name: Regenerate spec to a temp file
        run: OPENAPI_SPEC_FILE="$RUNNER_TEMP/openapi.fresh.json" npm run generate-config
        working-directory: apps/api

      - name: Compare against committed snapshot
        run: |
          # Compare normalized JSON (sorted keys) so formatting differences —
          # e.g. the repo's prettier-on-commit hook reformatting the committed
          # file vs generate-config's JSON.stringify output — don't cause false
          # failures. Only semantic spec drift should fail this check.
          if ! diff -u <(jq -S . stainless/openapi.json) <(jq -S . "$RUNNER_TEMP/openapi.fresh.json"); then
            echo "::error::stainless/openapi.json is out of sync with apps/api. Run 'OPENAPI_SPEC_FILE=stainless/openapi.json npm run generate-config' in apps/api and commit the result."
            exit 1
          fi
          echo "Committed OpenAPI spec is in sync."
