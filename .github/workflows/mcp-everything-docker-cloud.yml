name: Build and Push MCP Everything Docker Image (Cloud)

on:
  push:
    branches:
      - main
    paths:
      - "apps/mcp-everything/**"
      - ".github/workflows/mcp-everything-docker-cloud.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/mcp-everything/**"
      - ".github/workflows/mcp-everything-docker-cloud.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push MCP Everything Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/tambo-ai/mcp-everything
          tags: |
            type=raw,value=latest
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=MCP Everything Server
            org.opencontainers.image.description=Docker image for the MCP Everything server with streamable HTTP transport
            org.opencontainers.image.vendor=Tambo AI
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/tambo-ai/tambo
            org.opencontainers.image.documentation=https://docs.tambo.co

      - name: Determine if we should push to GHCR
        id: should_push
        run: |
          # Push to GHCR on main branch or manual trigger
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_push=true" >> $GITHUB_OUTPUT
            echo "Pushing to GHCR"
          else
            echo "should_push=false" >> $GITHUB_OUTPUT
            echo "Building locally for testing (no GHCR push)"
          fi

      - name: Login to GitHub Container Registry
        if: steps.should_push.outputs.should_push == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: tambo-bot
          password: ${{ secrets.RELEASE_PACKAGES }}

      - name: Build and push mcp-everything image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ./apps/mcp-everything
          file: ./apps/mcp-everything/Dockerfile
          push: ${{ steps.should_push.outputs.should_push }}
          load: ${{ steps.should_push.outputs.should_push == 'false' }}
          platforms: ${{ steps.should_push.outputs.should_push == 'true' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image built successfully
        run: |
          echo "✅ MCP Everything image built successfully"
          if [[ "${{ steps.should_push.outputs.should_push }}" == "true" ]]; then
            echo "📦 Pushed to ghcr.io/tambo-ai/mcp-everything:latest"
            echo "📦 Pushed to ghcr.io/tambo-ai/mcp-everything:${{ github.sha }}"
          else
            echo "🏗️  Built locally for testing"
          fi
